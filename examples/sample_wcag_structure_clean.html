<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Structure and purpose done right (clean sample)</title>
</head>
<body>
  <h1>Community Program Signup</h1>

  <h2>Personal Information</h2>

  <p>To continue, choose the "Submit form" button at the bottom of the form.</p>

  <form action="/signup" method="post">
    <fieldset>
      <legend>Preferred contact time</legend>
      <input type="radio" name="contact_time" id="morning" value="morning">
      <label for="morning">Morning</label>
      <input type="radio" name="contact_time" id="evening" value="evening">
      <label for="evening">Evening</label>
    </fieldset>

    <label for="full_name">Full name *</label>
    <input type="text" id="full_name" name="full_name" required autocomplete="name">

    <label for="email">Email address</label>
    <input type="email" id="email" name="email" autocomplete="email">

    <label for="phone">Phone number</label>
    <input type="tel" id="phone" name="phone" autocomplete="tel">

    <label for="zip">Postal code</label>
    <input type="text" id="zip" name="postal_code" autocomplete="postal-code">

    <button type="submit">Submit form</button>
  </form>

  <table>
    <tr><th scope="col">Day</th><th scope="col">Opens</th><th scope="col">Closes</th></tr>
    <tr><td>Monday</td><td>9:00</td><td>17:00</td></tr>
    <tr><td>Tuesday</td><td>9:00</td><td>17:00</td></tr>
  </table>
</body>
</html>
