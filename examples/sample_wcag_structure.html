<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Structure and purpose problems (seeded sample)</title>
</head>
<body>
  <h1>Community Program Signup</h1>

  <!-- fake heading: styled div instead of a heading element -->
  <div style="font-size: 28px; font-weight: bold;">Personal Information</div>

  <!-- sensory-only instruction -->
  <p>To continue, click the red button at the bottom of the form.</p>
  <p>The help menu is in the box on the right.</p>

  <form action="/signup" method="post">
    <!-- radio group without fieldset/legend -->
    <p>Preferred contact time:</p>
    <input type="radio" name="contact_time" id="morning" value="morning">
    <label for="morning">Morning</label>
    <input type="radio" name="contact_time" id="evening" value="evening">
    <label for="evening">Evening</label>

    <!-- visual-only required marker -->
    <label for="full_name">Full name *</label>
    <input type="text" id="full_name" name="full_name">

    <!-- common personal-data fields without autocomplete tokens -->
    <label for="email">Email address</label>
    <input type="email" id="email" name="email">

    <label for="phone">Phone number</label>
    <input type="tel" id="phone" name="phone">

    <label for="zip">Postal code</label>
    <input type="text" id="zip" name="postal_code">

    <!-- visible label missing from the accessible name -->
    <button type="submit" aria-label="Send application">Submit form</button>
  </form>

  <!-- data table without header cells -->
  <table>
    <tr><td>Monday</td><td>9:00</td><td>17:00</td></tr>
    <tr><td>Tuesday</td><td>9:00</td><td>17:00</td></tr>
    <tr><td>Wednesday</td><td>Closed</td><td>Closed</td></tr>
  </table>
</body>
</html>
