name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python 3.12 on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install A11yway with beta test and web dependencies
        run: python -m pip install -e ".[development,browser,documents,media,web]"

      - name: Install Playwright Chromium on Linux
        if: runner.os == 'Linux'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright Chromium on Windows
        if: runner.os == 'Windows'
        run: python -m playwright install chromium

      - name: Dependency health
        run: python -m pip check

      - name: Web dependency smoke test
        run: python -c "import flask; import a11yway.web_app"

      - name: Compile sources
        run: python -m compileall a11yway tests

      - name: Run tests with coverage
        run: python -m coverage run --branch -m pytest --junitxml reports/pytest.xml

      - name: Coverage reports
        run: |
          python -m coverage report -m
          python -m coverage json -o reports/coverage.json
          python -m coverage html -d reports/coverage_html

      - name: Build package
        run: python -m build

      - name: Installed wheel smoke test
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist -Filter "*.whl" | Select-Object -First 1 -ExpandProperty FullName
          python scripts/verify_wheel_install.py $wheel

      - name: Upload coverage and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ matrix.os }}
          path: |
            reports/pytest.xml
            reports/coverage.json
            reports/coverage_html/
          if-no-files-found: ignore

      - name: Upload built package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}
          path: dist/*
          if-no-files-found: ignore

  render-docker-smoke:
    name: Render Docker smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Render Docker image
        run: docker build -t a11yway-render-smoke .

      - name: Verify container runtime imports and Chromium
        run: |
          docker run --rm a11yway-render-smoke python --version
          docker run --rm a11yway-render-smoke python -c "from datetime import UTC; print(UTC)"
          docker run --rm a11yway-render-smoke python -c "import flask; import playwright; import a11yway.web_app"
          docker run --rm a11yway-render-smoke python -m playwright install --dry-run
          docker run --rm a11yway-render-smoke python -c "from playwright.sync_api import sync_playwright; p=sync_playwright().start(); b=p.chromium.launch(headless=True); print(b.version); b.close(); p.stop()"

      - name: Boot gunicorn and check health
        run: |
          docker run -d --name a11yway-render-smoke -e PORT=10000 -p 10000:10000 a11yway-render-smoke
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:10000/health; then
              exit 0
            fi
            docker logs --tail 40 a11yway-render-smoke || true
            sleep 2
          done
          docker logs a11yway-render-smoke
          exit 1

      - name: Run Render app smoke checks
        run: docker run --rm a11yway-render-smoke python scripts/render_docker_smoke.py

      - name: Stop Render smoke container
        if: always()
        run: docker rm -f a11yway-render-smoke || true
