<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}A11yway{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='web_demo/styles.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <header class="topbar">
    <a class="brand" href="{{ url_for('home') }}" aria-label="A11yway home">
      <span class="brand-mark" aria-hidden="true">A</span>
      <span>A11yway</span>
    </a>
    <nav aria-label="Primary navigation">
      <a href="{{ url_for('home') }}#audit">Audit a website</a>
      <a href="{{ url_for('home') }}#how">How it works</a>
      <a href="{{ url_for('home') }}#checks">What it tests</a>
      <a href="{{ url_for('past_runs') }}">Past runs</a>
      <a href="https://github.com/da-taki/A11yway" rel="noreferrer">GitHub</a>
    </nav>
  </header>
  <main id="main">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
