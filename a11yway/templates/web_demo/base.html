<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}A11yway Web Demo{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='web_demo/styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('home') }}">A11yway</a>
    <nav aria-label="Primary">
      <a href="{{ url_for('home') }}">New review</a>
      <a href="{{ url_for('past_runs') }}">Past runs</a>
    </nav>
  </header>
  <main class="shell">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
